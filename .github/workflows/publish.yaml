name: Build & Publish

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/lowranceworks/joshualowrance.com

jobs:
  build:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          podman build \
            -f Containerfile \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Test with podman play kube
        run: |
          # Swap image tag to the just-built SHA
          sed "s|image:.*|image: ${{ env.IMAGE }}:${{ github.sha }}|" \
            k8s/pod.yaml > /tmp/pod-test.yaml

          podman play kube /tmp/pod-test.yaml

          # Wait for container to be ready
          echo "Waiting for container to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Container is healthy"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Container failed to start"
              podman pod logs joshualowrance-com
              exit 1
            fi
            sleep 2
          done

          # Verify response
          STATUS=$(curl -o /dev/null -s -w '%{http_code}' http://localhost:3000)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            podman pod logs joshualowrance-com
            exit 1
          fi

          echo "Pod test passed"
          podman play kube --down /tmp/pod-test.yaml

      - name: Push image
        run: |
          podman push ${{ env.IMAGE }}:${{ github.sha }}
          podman push ${{ env.IMAGE }}:latest
